name: MDMS status check

on:
  schedule:
    - cron: "0 */6 * * *"    # every 6 hours (UTC) — notify only if changed
    - cron: "15 3 * * *"     # daily 03:15 UTC = 09:00 Nepal — always ping (heartbeat)
  workflow_dispatch:          # manual run from the Actions tab — always ping

permissions:
  contents: write             # needed to commit the last-seen status back

concurrency:
  group: mdms-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check status and notify
        env:
          MDMS_EMAIL: ${{ secrets.MDMS_EMAIL }}
          MDMS_IMEI:  ${{ secrets.MDMS_IMEI }}
          NTFY_TOPIC: ${{ secrets.MDMS_NTFY_TOPIC }}
          # Which schedule fired this run? ('' for manual dispatch)
          TRIGGER_CRON: ${{ github.event.schedule }}
          EVENT_NAME:   ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Always ping on the daily heartbeat cron or a manual run,
          # even when nothing changed.
          FORCE_NOTIFY=false
          if [ "${TRIGGER_CRON}" = "15 3 * * *" ] || [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            FORCE_NOTIFY=true
          fi

          # Query the portal (returns a full HTML results page)
          RAW=$(curl -s -X POST https://mdms.nta.gov.np/lost-track-status/checkStatus \
            --max-time 60 \
            -d "emailId=${MDMS_EMAIL}" \
            -d "imeiNumbers=${MDMS_IMEI}")

          # Guard: empty response = server down / timeout. Do NOT treat as a change.
          if [ -z "${RAW}" ]; then
            echo "Empty response from server — skipping this run."
            exit 0
          fi

          # Flatten the HTML to a single line of plain text:
          #   - remove <button>/<a> action controls first, INCLUDING their text
          #     (e.g. "I have found my mobile. Disable Tracking.") so button
          #     labels don't get mistaken for status,
          #   - strip remaining tags, decode &nbsp;, drop the trailing <script>
          #     block (it holds per-request tokens that cause false alarms),
          #   - squeeze whitespace.
          CLEAN=$(printf '%s' "${RAW}" \
            | tr '\n\r\t' '   ' \
            | sed -e 's/<button[^>]*>[^<]*<\/button>/ /g' \
                  -e 's/<a [^>]*>[^<]*<\/a>/ /g' \
                  -e 's/<[^>]*>/ /g' \
                  -e 's/&nbsp;/ /g' \
                  -e 's/\$(document.*//' \
            | tr -s ' ')

          # Pull out just the three status lines that actually change over time.
          NEW=$(printf '%s' "${CLEAN}" | sed -n \
            's/.*Application Status \(.*\) 2 Tracking Status \(.*\) 3 Device Status \(.*\)$/Application Status: \1\nTracking Status: \2\nDevice Status: \3/p')

          # Fallback for other responses (e.g. "Record Not Found!" or a layout
          # change): use the trimmed plain text so we still get alerted.
          if [ -z "${NEW}" ]; then
            NEW=$(printf '%s' "${CLEAN}" | sed -e 's/^ *//' -e 's/ *$//' | cut -c1-400)
          fi

          if [ -z "${NEW}" ]; then
            echo "Could not parse a status — skipping this run."
            exit 0
          fi

          echo "Current status:"
          echo "${NEW}"

          OLD=$(cat last_status.txt 2>/dev/null || echo "")
          CHANGED=false
          [ "${NEW}" != "${OLD}" ] && CHANGED=true

          if [ "${CHANGED}" = true ] || [ "${FORCE_NOTIFY}" = true ]; then
            if [ "${CHANGED}" = true ]; then
              TITLE="MDMS application status changed"
              PRIORITY="high"
              TAGS="bell"
            else
              TITLE="MDMS heartbeat — no change"
              PRIORITY="default"
              TAGS="white_check_mark"
            fi
            echo "Sending notification (changed=${CHANGED}, forced=${FORCE_NOTIFY})."
            printf '%s' "${NEW}" | curl -s \
              -H "Title: ${TITLE}" \
              -H "Priority: ${PRIORITY}" \
              -H "Tags: ${TAGS}" \
              --data-binary @- \
              "ntfy.sh/${NTFY_TOPIC}"
          else
            echo "No change and no heartbeat — staying quiet."
          fi

          # Only persist state when the status genuinely changed.
          if [ "${CHANGED}" = true ]; then
            printf '%s' "${NEW}" > last_status.txt
            git config user.name  "mdms-bot"
            git config user.email "mdms-bot@users.noreply.github.com"
            git add last_status.txt
            git commit -m "MDMS status update"
            git push
          fi
