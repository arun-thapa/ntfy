name: MDMS status check

on:
  schedule:
    - cron: "0 */3 * * *"    # every 3 hours (UTC) — notify only if changed
    # Daily heartbeat, retried across a window: GitHub frequently delays or
    # drops scheduled runs, so we give it three chances to land. The dedup
    # guard below makes sure only the first one that lands actually pings.
    - cron: "15 3 * * *"     # 03:15 UTC = 09:00 Nepal (heartbeat)
    - cron: "45 3 * * *"     # 03:45 UTC = 09:30 Nepal (retry)
    - cron: "15 4 * * *"     # 04:15 UTC = 10:00 Nepal (retry)
  workflow_dispatch:          # manual run from the Actions tab — always ping

permissions:
  contents: write             # needed to commit the last-seen status back

concurrency:
  group: mdms-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check status and notify
        env:
          MDMS_EMAIL: ${{ secrets.MDMS_EMAIL }}
          MDMS_IMEI:  ${{ secrets.MDMS_IMEI }}
          NTFY_TOPIC: ${{ secrets.MDMS_NTFY_TOPIC }}
          # Which schedule fired this run? ('' for manual dispatch)
          TRIGGER_CRON: ${{ github.event.schedule }}
          EVENT_NAME:   ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Is this run one of the daily heartbeat retry slots?
          HEARTBEAT_CRON=false
          case "${TRIGGER_CRON}" in
            "15 3 * * *"|"45 3 * * *"|"15 4 * * *") HEARTBEAT_CRON=true ;;
          esac

          # Always ping on a manual run. For the heartbeat, ping only if we
          # haven't already sent one today — so the retry slots don't spam you
          # when more than one lands. The marker lives in last_heartbeat.txt.
          TODAY=$(date -u +%F)
          LAST_HB=$(cat last_heartbeat.txt 2>/dev/null || echo "")
          FORCE_NOTIFY=false
          HEARTBEAT_FIRED=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            FORCE_NOTIFY=true
          elif [ "${HEARTBEAT_CRON}" = true ] && [ "${TODAY}" != "${LAST_HB}" ]; then
            FORCE_NOTIFY=true
            HEARTBEAT_FIRED=true
          fi

          # Query the portal (returns a full HTML results page)
          RAW=$(curl -s -X POST https://mdms.nta.gov.np/lost-track-status/checkStatus \
            --max-time 60 \
            -d "emailId=${MDMS_EMAIL}" \
            -d "imeiNumbers=${MDMS_IMEI}")

          # Guard: empty response = server down / timeout. Do NOT treat as a change.
          if [ -z "${RAW}" ]; then
            echo "Empty response from server — skipping this run."
            exit 0
          fi

          # Flatten the HTML to a single line of plain text:
          #   - remove <button>/<a> action controls first, INCLUDING their text
          #     (e.g. "I have found my mobile. Disable Tracking.") so button
          #     labels don't get mistaken for status,
          #   - strip remaining tags, decode &nbsp;, drop the trailing <script>
          #     block (it holds per-request tokens that cause false alarms),
          #   - squeeze whitespace.
          CLEAN=$(printf '%s' "${RAW}" \
            | tr '\n\r\t' '   ' \
            | sed -e 's/<button[^>]*>[^<]*<\/button>/ /g' \
                  -e 's/<a [^>]*>[^<]*<\/a>/ /g' \
                  -e 's/<[^>]*>/ /g' \
                  -e 's/&nbsp;/ /g' \
                  -e 's/\$(document.*//' \
            | tr -s ' ')

          # Pull out just the three status lines that actually change over time.
          NEW=$(printf '%s' "${CLEAN}" | sed -n \
            's/.*Application Status \(.*\) 2 Tracking Status \(.*\) 3 Device Status \(.*\)$/Application Status: \1\nTracking Status: \2\nDevice Status: \3/p')

          # Fallback for other responses (e.g. "Record Not Found!" or a layout
          # change): use the trimmed plain text so we still get alerted.
          if [ -z "${NEW}" ]; then
            NEW=$(printf '%s' "${CLEAN}" | sed -e 's/^ *//' -e 's/ *$//' | cut -c1-400)
          fi

          if [ -z "${NEW}" ]; then
            echo "Could not parse a status — skipping this run."
            exit 0
          fi

          echo "Current status:"
          echo "${NEW}"

          OLD=$(cat last_status.txt 2>/dev/null || echo "")
          CHANGED=false
          [ "${NEW}" != "${OLD}" ] && CHANGED=true

          # Has the phone been DETECTED? True when the Device Status line
          # exists and no longer says "Not Found".
          DEVICE_FOUND=false
          DLINE=$(printf '%s\n' "${NEW}" | grep -i '^Device Status:' || true)
          if [ -n "${DLINE}" ] && ! printf '%s' "${DLINE}" | grep -qi 'not found'; then
            DEVICE_FOUND=true
          fi

          if [ "${CHANGED}" = true ] || [ "${FORCE_NOTIFY}" = true ]; then
            if [ "${CHANGED}" = true ] && [ "${DEVICE_FOUND}" = true ]; then
              # The big one: phone detected. Max priority = loud ringing alert
              # that overrides silent mode (given the phone-side setup).
              TITLE="🚨 DEVICE DETECTED — open MDMS now"
              PRIORITY="urgent"      # ntfy priority 5 (max)
              TAGS="rotating_light"
            elif [ "${CHANGED}" = true ]; then
              TITLE="MDMS application status changed"
              PRIORITY="high"
              TAGS="bell"
            else
              TITLE="MDMS heartbeat — no change"
              PRIORITY="default"
              TAGS="white_check_mark"
            fi
            echo "Sending notification (changed=${CHANGED}, forced=${FORCE_NOTIFY}, device_found=${DEVICE_FOUND})."
            printf '%s' "${NEW}" | curl -s \
              -H "Title: ${TITLE}" \
              -H "Priority: ${PRIORITY}" \
              -H "Tags: ${TAGS}" \
              -H "Click: https://mdms.nta.gov.np/lost-track-status" \
              --data-binary @- \
              "ntfy.sh/${NTFY_TOPIC}"
          else
            echo "No change and no heartbeat — staying quiet."
          fi

          # Persist state: the seen status (on change) and/or today's heartbeat
          # marker (so the retry slots dedup). Commit only if something changed.
          NEED_COMMIT=false
          if [ "${CHANGED}" = true ]; then
            printf '%s' "${NEW}" > last_status.txt
            git add last_status.txt
            NEED_COMMIT=true
          fi
          if [ "${HEARTBEAT_FIRED}" = true ]; then
            printf '%s' "${TODAY}" > last_heartbeat.txt
            git add last_heartbeat.txt
            NEED_COMMIT=true
          fi
          if [ "${NEED_COMMIT}" = true ]; then
            git config user.name  "mdms-bot"
            git config user.email "mdms-bot@users.noreply.github.com"
            git commit -m "MDMS state update"
            git push
          fi
